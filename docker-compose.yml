services:
  rag-testgen-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: rag-testgen-api:local
    container_name: rag-testgen-api
    ports:
      - "8000:8000"
    environment:
      APP_MODE: "api"

      APP_NAME: "RAG LangGraph TestGen API"
      APP_ENV: "local"
      API_PREFIX: "/api/v1"
      LOG_LEVEL: "INFO"

      CHROMA_DB_DIR: "/app/chroma_db"
      CHROMA_PERSIST_DIR: "/app/chroma_db"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"

      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "qwen2.5-coder:7b"

      JWT_SECRET_KEY: "change-this-secret-in-production"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"

      CORS_ORIGINS: "*"

      DATABASE_URL: "sqlite:////app/data/rag_testgen.db"

      REDIS_URL: "redis://redis:6379/0"
      GENERATION_STATUS_TTL_SECONDS: "3600"
      USER_RATE_LIMIT_PER_MINUTE: "10"
      MAX_ACTIVE_JOBS_PER_USER: "3"

      AWS_REGION: "ap-south-1"
      SQS_GENERATION_QUEUE_URL: ""

      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      KAFKA_EVENTS_TOPIC: "rag-generation-events"

    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data

    depends_on:
      - redis
      - redpanda

    restart: unless-stopped


  rag-testgen-worker:
    image: rag-testgen-api:local
    container_name: rag-testgen-worker
    environment:
      APP_MODE: "worker"

      APP_NAME: "RAG LangGraph TestGen API"
      APP_ENV: "local"
      API_PREFIX: "/api/v1"
      LOG_LEVEL: "INFO"

      CHROMA_DB_DIR: "/app/chroma_db"
      CHROMA_PERSIST_DIR: "/app/chroma_db"
      EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"

      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "qwen2.5-coder:7b"

      JWT_SECRET_KEY: "change-this-secret-in-production"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"

      CORS_ORIGINS: "*"

      DATABASE_URL: "sqlite:////app/data/rag_testgen.db"

      REDIS_URL: "redis://redis:6379/0"
      GENERATION_STATUS_TTL_SECONDS: "3600"
      USER_RATE_LIMIT_PER_MINUTE: "10"
      MAX_ACTIVE_JOBS_PER_USER: "3"

      AWS_REGION: "ap-south-1"
      SQS_GENERATION_QUEUE_URL: ""

      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: "redpanda:9092"
      KAFKA_EVENTS_TOPIC: "rag-generation-events"

    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/logs:/app/logs
      - ./backend/data:/app/data

    depends_on:
      - redis
      - redpanda

    restart: unless-stopped


  redis:
    image: redis:7
    container_name: rag-testgen-redis
    ports:
      - "6379:6379"
    restart: unless-stopped


  redpanda:
    image: redpandadata/redpanda:latest
    container_name: rag-testgen-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
    restart: unless-stopped