services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-langgraph-testgen-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/sample_repos:/app/sample_repos
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen2.5-coder:7b