apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-testgen-api
  namespace: rag-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-testgen-api
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70